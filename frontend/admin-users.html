<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users – Sayansi Yathu Admin</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="p-xl">
        <div class="mb-2xl">
                <h1>User Management <span class="badge badge-primary">Admin</span></h1>
                <p>Manage users, roles, and permissions across the platform.</p>
            </div>

            <!-- Search and Filter -->
            <div class="card mb-lg">
                <div class="flex justify-between items-center">
                    <input type="text" id="searchUsers" placeholder="Search by name or email..." style="flex: 1; padding: 0.5rem; border: 1px solid var(--gray-300); border-radius: 4px; margin-right: 1rem;">
                    <select id="roleFilter" style="padding: 0.5rem; border: 1px solid var(--gray-300); border-radius: 4px; margin-right: 1rem;">
                        <option value="">All Roles</option>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="admin">Admin</option>
                    </select>
                    <button class="btn btn-primary" onclick="showAddUserModal()">+ Add User</button>
                </div>
            </div>

            <!-- Users Table -->
            <div class="card">
                <h3>All Users</h3>
                <div id="usersTableContainer" style="overflow-x: auto; margin-top: 1rem;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead style="background: var(--gray-100); text-align: left;">
                            <tr>
                                <th style="padding: 0.75rem; border-bottom: 2px solid var(--gray-300);">ID</th>
                                <th style="padding: 0.75rem; border-bottom: 2px solid var(--gray-300);">Name</th>
                                <th style="padding: 0.75rem; border-bottom: 2px solid var(--gray-300);">Email</th>
                                <th style="padding: 0.75rem; border-bottom: 2px solid var(--gray-300);">Role</th>
                                <th style="padding: 0.75rem; border-bottom: 2px solid var(--gray-300);">Created</th>
                                <th style="padding: 0.75rem; border-bottom: 2px solid var(--gray-300);">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr>
                                <td colspan="6" style="padding: 2rem; text-align: center;">Loading users...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </main>
    <script src="js/admin-users.js?v=3"></script>
</body>
</html>
