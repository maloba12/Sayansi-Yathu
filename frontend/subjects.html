<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiments – Sayansi Yathu</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container navbar-content">
            <div class="logo-container">
                <img src="assets/logo1.jpeg" alt="Sayansi Yathu" class="logo-image">
                <span class="brand-name">Sayansi Yathu</span>
            </div>
            <ul class="nav-links">
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="subjects.html" class="nav-link active">Experiments</a></li>
                <li><a href="#" class="nav-link" id="logoutLink">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="container mt-2xl">
        <div class="text-center mb-2xl">
            <h1>Virtual Science Experiments</h1>
            <p style="color: var(--gray-700); margin-top: var(--space-md);">
                Choose an experiment to begin hands-on virtual learning
            </p>
        </div>

        <!-- Filters -->
        <div class="mb-xl">
            <!-- Level 1: Curriculum -->
            <div class="flex justify-center gap-md mb-md">
                <button class="btn btn-secondary curriculum-btn active" data-curriculum="new">🆕 New Curriculum (Form 1)</button>
                <button class="btn btn-secondary curriculum-btn" data-curriculum="old">📚 Old Curriculum (Grades 10–12)</button>
            </div>
            
            <!-- Level 2: Grade (hidden by default since New Curriculum is Form 1) -->
            <div class="flex justify-center gap-md mb-md" id="gradeFilters" style="display: none;">
                <button class="btn btn-secondary grade-btn active" data-grade="Grade 10">Grade 10</button>
                <button class="btn btn-secondary grade-btn" data-grade="Grade 11">Grade 11</button>
                <button class="btn btn-secondary grade-btn" data-grade="Grade 12">Grade 12</button>
            </div>

            <!-- Level 3: Subject -->
            <div class="flex justify-center gap-md">
                <button class="btn btn-secondary subject-btn active" data-subject="all">All Subjects</button>
                <button class="btn btn-secondary subject-btn" data-subject="biology">Biology</button>
                <button class="btn btn-secondary subject-btn" data-subject="chemistry">Chemistry</button>
                <button class="btn btn-secondary subject-btn" data-subject="physics">Physics</button>
            </div>
        </div>

        <!-- Experiments Grid -->
        <div class="grid grid-cols-3" id="experimentsGrid">
            <!-- Loading state -->
            <div class="card text-center" style="grid-column: 1 / -1;">
                <p>Loading experiments...</p>
            </div>
        </div>
    </main>

    <script>
        // Experiments Page Logic
        class ExperimentsPage {
            constructor() {
                this.apiBase = 'http://localhost:8000/api';
                this.experiments = [];
                this.currentCurriculum = 'new';
                this.currentGrade = 'Form 1';
                this.currentSubject = 'all';
                this.init();
            }

            async init() {
                this.loadUserPreferences();
                this.updateFilterUI();
                await this.loadExperiments();
                this.attachEventListeners();
            }

            loadUserPreferences() {
                try {
                    const userDataStr = localStorage.getItem('user_data');
                    if (userDataStr) {
                        const userData = JSON.parse(userDataStr);
                        if (userData.profile && userData.profile.grade_or_form) {
                            const grade = userData.profile.grade_or_form;
                            // Check if it's new or old curriculum
                            if (grade.toLowerCase().includes('form')) {
                                this.currentCurriculum = 'new';
                                this.currentGrade = grade;
                            } else if (grade.toLowerCase().includes('grade')) {
                                this.currentCurriculum = 'old';
                                this.currentGrade = grade;
                            }
                        }
                    }
                } catch(e) { console.error("Error loading user preferences", e); }
            }

            updateFilterUI() {
                // Update Curriculum Buttons
                document.querySelectorAll('.curriculum-btn').forEach(btn => {
                    if (btn.dataset.curriculum === this.currentCurriculum) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });

                // Show/Hide Grade Filters
                const gradeFilters = document.getElementById('gradeFilters');
                if (this.currentCurriculum === 'old') {
                    gradeFilters.style.display = 'flex';
                    // Default to Grade 10 if switching from New to Old without a grade
                    if (!this.currentGrade.toLowerCase().includes('grade')) {
                        this.currentGrade = 'Grade 10';
                    }
                } else {
                    gradeFilters.style.display = 'none';
                    this.currentGrade = 'Form 1';
                }

                // Update Grade Buttons
                document.querySelectorAll('.grade-btn').forEach(btn => {
                    if (btn.dataset.grade === this.currentGrade) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });

                // Update Subject Buttons
                document.querySelectorAll('.subject-btn').forEach(btn => {
                    if (btn.dataset.subject === this.currentSubject) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }

            async loadExperiments() {
                try {
                    // Show loading
                    const grid = document.getElementById('experimentsGrid');
                    grid.innerHTML = '<div class="card text-center" style="grid-column: 1 / -1;"><p>Loading experiments...</p></div>';

                    let userId = 1; // Default
                    try {
                        const userData = localStorage.getItem('user_data');
                        if (userData) {
                             userId = JSON.parse(userData).id;
                        }
                    } catch(e) { console.error("User ID parse error", e); }
                    
                    const url = `${this.apiBase}/getExperiment.php?userId=${userId}&curriculum=${this.currentCurriculum}&grade=${encodeURIComponent(this.currentGrade)}`;
                    const response = await fetch(url);
                    const data = await response.json();

                    if (Array.isArray(data)) {
                        this.experiments = data;
                        this.renderExperiments();
                    } else if (data.success && Array.isArray(data.simulations)) {
                        // Fallback in case backend changes structure later
                        this.experiments = data.simulations;
                        this.renderExperiments();
                    } else {
                        console.error("Unexpected API format:", data);
                        grid.innerHTML = '<div class="card text-center" style="grid-column: 1 / -1;"><p>Error loading experiments</p></div>';
                    }
                } catch (error) {
                    console.error('Load experiments error:', error);
                    const grid = document.getElementById('experimentsGrid');
                    grid.innerHTML = '<div class="card text-center" style="grid-column: 1 / -1;"><p>Error loading experiments</p></div>';
                }
            }

            renderExperiments() {
                const grid = document.getElementById('experimentsGrid');
                // The backend already filters by curriculum and grade, so we just filter by subject here if needed
                // (or if we fetched all and filtering locally, but we fetch with curriculum/grade parameters)
                const filtered = this.currentSubject === 'all'
                    ? this.experiments
                    : this.experiments.filter(e => e.subject && e.subject.toLowerCase() === this.currentSubject.toLowerCase());

                if (filtered.length === 0) {
                    if (this.currentCurriculum === 'old') {
                        grid.innerHTML = `<div class="card text-center" style="grid-column: 1 / -1;"><p>Coming soon — experiments being added for ${this.currentGrade}</p></div>`;
                    } else {
                        grid.innerHTML = '<div class="card text-center" style="grid-column: 1 / -1;"><p>No experiments found</p></div>';
                    }
                    return;
                }

                grid.innerHTML = filtered.map(exp => `
                    <div class="card" style="cursor: pointer;" onclick="window.location.href='simulation-player.html?id=${exp.id}'">
                        <div class="card-header">
                            <div class="flex justify-between items-center mb-sm">
                                <span class="badge badge-${(exp.subject || 'general').toLowerCase()}">${exp.subject}</span>
                                <span class="badge badge-${(exp.difficulty_level || 'beginner').toLowerCase()}">${exp.difficulty_level || 'Beginner'}</span>
                            </div>
                            <h3 class="card-title">${exp.title}</h3>
                        </div>
                        <p class="card-subtitle">${exp.description || 'Click to start this experiment'}</p>
                        <button class="btn btn-primary mt-md" style="width: 100%;">Start Experiment →</button>
                    </div>
                `).join('');
            }

            attachEventListeners() {
                // Curriculum Filters
                document.querySelectorAll('.curriculum-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.currentCurriculum = e.target.dataset.curriculum;
                        this.updateFilterUI();
                        this.loadExperiments();
                    });
                });

                // Grade Filters
                document.querySelectorAll('.grade-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.currentGrade = e.target.dataset.grade;
                        this.updateFilterUI();
                        this.loadExperiments();
                    });
                });

                // Subject Filters
                document.querySelectorAll('.subject-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.currentSubject = e.target.dataset.subject;
                        this.updateFilterUI();
                        this.renderExperiments(); // Local filter, no need to refetch
                    });
                });

                document.getElementById('logoutLink').addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.clear();
                    window.location.href = 'login.html';
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new ExperimentsPage();
        });
    </script>

    <style>
        .filter-btn.active {
            background: var(--primary-blue);
            color: var(--white);
            border-color: var(--primary-blue);
        }
    </style>
</body>

</html>
