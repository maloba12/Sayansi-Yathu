<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings – Sayansi Yathu Admin</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="p-xl">
        <div class="mb-2xl">
                <h1>System Settings <span class="badge badge-primary">Admin</span></h1>
                <p>Configure platform settings and preferences.</p>
            </div>

            <!-- General Settings -->
            <div class="card mb-lg">
                <h3>General Settings</h3>
                <form style="margin-top: 1rem;">
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Platform Name</label>
                        <input type="text" value="Sayansi Yathu" style="width: 100%; padding: 0.5rem; border: 1px solid var(--gray-300); border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Support Email</label>
                        <input type="email" value="support@sayansi-yathu.zm" style="width: 100%; padding: 0.5rem; border: 1px solid var(--gray-300); border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">
                            <input type="checkbox" checked style="margin-right: 0.5rem;">
                            Allow student self-registration
                        </label>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">
                            <input type="checkbox" checked style="margin-right: 0.5rem;">
                            Enable email notifications
                        </label>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="alert('Settings saved!')">Save Changes</button>
                </form>
            </div>

            <!-- Security Settings -->
            <div class="card mb-lg">
                <h3>Security Settings</h3>
                <form style="margin-top: 1rem;">
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Session Timeout (minutes)</label>
                        <input type="number" value="30" min="5" max="120" style="width: 200px; padding: 0.5rem; border: 1px solid var(--gray-300); border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Maximum Login Attempts</label>
                        <input type="number" value="5" min="3" max="10" style="width: 200px; padding: 0.5rem; border: 1px solid var(--gray-300); border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">
                            <input type="checkbox" checked style="margin-right: 0.5rem;">
                            Require password change every 90 days
                        </label>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">
                            <input type="checkbox" style="margin-right: 0.5rem;">
                            Enable two-factor authentication
                        </label>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="alert('Security settings saved!')">Save Changes</button>
                </form>
            </div>

            <!-- Database Management -->
            <div class="card">
                <h3>Database Management</h3>
                <div style="margin-top: 1rem;">
                    <p style="color: var(--gray-700); margin-bottom: 1rem;">Perform maintenance tasks and backups.</p>
                    <button class="btn btn-outline" style="margin-right: 0.5rem;" onclick="window.location.href='http://localhost:8000/api/admin/backup.php'">Create Backup</button>
                    <button class="btn btn-outline" onclick="alert('Cache cleared!')">Clear Cache</button>
                </div>
            </div>
        </main>
    </main>

    <script>
        document.getElementById('logoutLink').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
